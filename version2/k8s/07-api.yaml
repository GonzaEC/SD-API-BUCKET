apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: sd-api-bucket-v2
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: sd-api-bucket:v2
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: STORAGE_MODE
              valueFrom:
                configMapKeyRef:
                  name: bucket-api-config
                  key: STORAGE_MODE
            - name: VAULT_ADDR
              value: http://vault:8200
            - name: VAULT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: vault-bootstrap-secrets
                  key: VAULT_TOKEN
            - name: VAULT_GCP_SECRET_PATH
              valueFrom:
                configMapKeyRef:
                  name: bucket-api-config
                  key: VAULT_GCP_SECRET_PATH
            - name: VAULT_MINIO_SECRET_PATH
              valueFrom:
                configMapKeyRef:
                  name: bucket-api-config
                  key: VAULT_MINIO_SECRET_PATH
          readinessProbe:
            httpGet:
              path: /docs
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /docs
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: sd-api-bucket-v2
spec:
  type: ClusterIP
  selector:
    app: api
  ports:
    - name: http
      port: 8000
      targetPort: 8000

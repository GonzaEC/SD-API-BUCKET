services:

  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: "minioadmin"
      MINIO_ROOT_PASSWORD: "minioadmin"
    volumes:
      - ./minio-data:/data

  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until /usr/bin/mc alias set local http://minio:9000 minioadmin minioadmin; do sleep 2; done;
      /usr/bin/mc mb --ignore-existing local/local-bucket;
      "

  vault:
    image: hashicorp/vault:latest
    container_name: vault
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: "root-token"
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    cap_add:
      - IPC_LOCK
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8200/v1/sys/health"]
      interval: 5s
      timeout: 3s
      retries: 10

  vault-init:
    image: hashicorp/vault:latest
    container_name: vault-init
    depends_on:
      vault:
        condition: service_healthy
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_ADDR: "http://vault:8200"
      VAULT_TOKEN: "root-token"
      STORAGE_MODE: "${STORAGE_MODE:-CLOUD}"
      GOOGLE_CLOUD_PROJECT: "${GOOGLE_CLOUD_PROJECT:-tp3-gcp-497003}"
      GCS_BUCKET_NAME: "${GCS_BUCKET_NAME:-ejercicio-1-grupo-abc}"
      MINIO_ENDPOINT: "minio:9000"
      MINIO_ACCESS_KEY: "minioadmin"
      MINIO_SECRET_KEY: "minioadmin"
      MINIO_BUCKET_NAME: "local-bucket"
      MINIO_SECURE: "false"
    volumes:
      - ./vault/init.sh:/init.sh:ro
      - ./secrets:/secrets:ro
    entrypoint: ["sh", "/init.sh"]

  api:
    build: .
    container_name: api
    ports:
      - "8000:8000"
    environment:
      STORAGE_MODE: "${STORAGE_MODE:-CLOUD}"
      VAULT_ADDR: "http://vault:8200"
      VAULT_TOKEN: "root-token"
      VAULT_GCP_SECRET_PATH: "gcp/config"
      VAULT_MINIO_SECRET_PATH: "minio/config"
    depends_on:
      minio-init:
        condition: service_completed_successfully
      vault-init:
        condition: service_completed_successfully
